<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Startup Village Club</title>
    <link rel="stylesheet" href="css/auth.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="auth-wrapper">
        <div class="header-section">
            <img src="image.jpg.jpg" alt="Startup Village Club Logo" class="logo">
            <h1 class="club-title">Startup Village Club</h1>
        </div>

        <!-- Signup Form -->
        <div class="auth-container">
            <h2 class="form-title">Create an Account</h2>
            <form id="signupForm">
                <!-- Name -->
                <div class="form-group">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email address">
                </div>
                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
                </div>
                <!-- Car Number -->
                <div class="form-group">
                    <label for="carNumber">Car Number <span class="required">*</span></label>
                    <input type="text" id="carNumber" name="carNumber" required placeholder="Enter your car number">
                </div>
                <!-- Referral ID -->
                <div class="form-group">
                    <label for="referral">Referral ID</label>
                    <input type="text" id="referral" name="referral" placeholder="Enter referral ID(optional)">
                </div>
                <!-- Company/LinkedIn Link -->
                <div class="form-group">
                    <label for="companyLink">Company/LinkedIn Link</label>
                    <input type="url" id="companyLink" name="companyLink" placeholder="Enter company or LinkedIn link(optional">
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>

            <div class="links">
                <a href="Smart_Connect.html">Go to Dashboard</a>
            </div>
            
            <!-- Status message container -->
            <div id="statusMessage" class="status-message" style="display: none;"></div>
        </div>
    </div>

    <style>
        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }
        
        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
        </div>
    </div>

    <script>
        function showStatusMessage(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
            statusDiv.style.display = 'block';
            
            // Scroll to status message
            statusDiv.scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            
            // Hide any previous status messages
            document.getElementById('statusMessage').style.display = 'none';
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatusMessage(result.message, 'success');
                    this.reset();
                } else {
                    showStatusMessage('Error: ' + result.message, 'error');
                }
            } catch (err) {
                showStatusMessage('Error connecting to server. Please try again.', 'error');
                console.error(err);
            } finally {
                // Reset button state
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
